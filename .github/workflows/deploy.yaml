name: Deploy Node App (ECR + EC2)

on:
  push:
    branches:
      - main


env:
    AWS_REGION: us-east-2
    ECR_REPOSITORY: unimar-pos-fullstack
    IMAGE_TAG: latest

jobs:
    deploy:
            runs-on: ubuntu-latest

            steps:
              - name: Checkout código
                uses: actions/checkout@v4

        # 🔐 Autenticação AWS
              - name: Configurar credenciais AWS
                uses: aws-actions/configure-aws-credentials@v4
                with:
                    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                    aws-region: us-east-2

        # 🔑 Login ECR via TOKEN (importante)
              - name: 🔑 Login no ECR
                uses: aws-actions/amazon-ecr-login@v2

        # 🐳 Build da imagem
              - name: Build Docker
                run: |
                    docker build -t $ECR_REPOSITORY .

              - name: 🏷️ Tag da imagem
                run: |
                  IMAGE_NAME=$ECR_REPOSITORY
                  docker tag $IMAGE_NAME:latest $ECR_REPOSITORY:latest

        # 📤 Push para ECR
              - name: 🚀 Push para ECR
                run: |
                  docker push $ECR_REPOSITORY:latest


        # 🚀 Deploy no EC2 via SSH
              - name: Deploy na EC2
                uses: appleboy/ssh-action@v1.0.3
                with:
                    host: ${{ secrets.EC2_HOST }}
                    username: ubuntu
                    key: ${{ secrets.EC2_SSH_KEY }}
                    script: |
                        AWS_REGION= us-east-2
                        ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
                        IMAGE=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}


                        echo "🔑 Login no ECR..."
                        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
                          docker login --username AWS --password-stdin $ECR_URI


                        # Pull da nova imagem
                        docker pull $IMAGE

                        # Stop container antigo
                        docker stop my-node-app || true
                        docker rm my-node-app || true

                        # Subir novo container
                        docker run -d \
                        --name my-node-app \
                        -p 3000:3000 \
                        $IMAGE
